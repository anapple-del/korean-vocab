        function playSoundEffect(type) { if (!appData.settings.soundEnabled) return; try { const ctx = ensureAudioContext(), now = ctx.currentTime, osc = ctx.createOscillator(), gain = ctx.createGain(); osc.connect(gain); gain.connect(ctx.destination); switch (type) { case 'flip': osc.type = 'sine'; osc.frequency.setValueAtTime(800, now); osc.frequency.exponentialRampToValueAtTime(1200, now + 0.06); gain.gain.setValueAtTime(0.15, now); gain.gain.exponentialRampToValueAtTime(0.001, now + 0.12); osc.start(now); osc.stop(now + 0.12); break; case 'correct': osc.type = 'sine'; osc.frequency.setValueAtTime(523, now); osc.frequency.setValueAtTime(659, now + 0.08); osc.frequency.setValueAtTime(784, now + 0.16); gain.gain.setValueAtTime(0.25, now); gain.gain.exponentialRampToValueAtTime(0.001, now + 0.3); osc.start(now); osc.stop(now + 0.3); break; case 'hard': osc.type = 'sine'; osc.frequency.setValueAtTime(180, now); osc.frequency.exponentialRampToValueAtTime(70, now + 0.25); gain.gain.setValueAtTime(0.35, now); gain.gain.exponentialRampToValueAtTime(0.001, now + 0.35); osc.start(now); osc.stop(now + 0.35); break; case 'mark': osc.type = 'sine'; osc.frequency.setValueAtTime(600, now); osc.frequency.setValueAtTime(700, now + 0.04); gain.gain.setValueAtTime(0.12, now); gain.gain.exponentialRampToValueAtTime(0.001, now + 0.1); osc.start(now); osc.stop(now + 0.1); break; case 'click': osc.type = 'sine'; osc.frequency.setValueAtTime(1000, now); gain.gain.setValueAtTime(0.1, now); gain.gain.exponentialRampToValueAtTime(0.001, now + 0.05); osc.start(now); osc.stop(now + 0.05); break; case 'add': osc.type = 'sine'; osc.frequency.setValueAtTime(660, now); osc.frequency.setValueAtTime(880, now + 0.06); gain.gain.setValueAtTime(0.2, now); gain.gain.exponentialRampToValueAtTime(0.001, now + 0.15); osc.start(now); osc.stop(now + 0.15); break; } } catch (e) {} }
        function initAudioContextOnInteraction() { const r = () => { if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume().catch(() => {}); }; ['touchstart','click','keydown'].forEach(e => document.addEventListener(e, r, { once: true, passive: true })); }

        function stopGoogleAudio() { if (currentGoogleAudio) { try { currentGoogleAudio.pause(); currentGoogleAudio.currentTime = 0; currentGoogleAudio.src = ''; } catch (e) {} currentGoogleAudio = null; } }

        // 数据初始化与存储

        function initData() { let raw = localStorage.getItem(STORAGE_KEY); if (raw) { try { appData = JSON.parse(raw); } catch (e) { initDefault(); return; } appData.books.forEach(b => { if (!b.groups) b.groups = []; if (b.color === undefined) b.color = '#f7a8c4'; b.words.forEach(w => { if (w.tags && !w.notes) { w.notes = (w.tags || []).join(','); delete w.tags; } if (!w.notes) w.notes = ''; if (w.groupId === undefined) w.groupId = null; }); }); if (!appData.stats) appData.stats = { checkIns: [], todayNewCount: 0, todayReviewCount: 0, todayCorrect: 0, todayTotal: 0, streak: 0, dailyNewGoal: 10, lastBackupDate: null }; if (!appData.settings) appData.settings = { darkMode: false, fontSize: 36, lang: 'zh', reviewIntervals: { hardMin: 10, fuzzyHr: 4, easyStages: [1,3,7,15,30] }, spellMode: 'random', reminderEnabled: false, reminderTime: '09:00', selectedVoiceURI: 'auto', soundEnabled: true, autoReadOnReview: false, speakerIcon: 'icon-speaker-e', spellErrorCounts: {}, reviewOrder: 'random', spellOrder: 'random', backupReminderEnabled: true }; if (!appData.settings.reviewIntervals) appData.settings.reviewIntervals = { hardMin: 10, fuzzyHr: 4, easyStages: [1,3,7,15,30] }; if (!appData.settings.speakerIcon) appData.settings.speakerIcon = 'icon-speaker-e'; if (!appData.settings.spellErrorCounts) appData.settings.spellErrorCounts = {}; if (appData.settings.selectedVoiceURI === undefined) appData.settings.selectedVoiceURI = 'auto'; if (appData.settings.soundEnabled === undefined) appData.settings.soundEnabled = true; if (appData.settings.autoReadOnReview === undefined) appData.settings.autoReadOnReview = false; if (appData.settings.backupReminderEnabled === undefined) appData.settings.backupReminderEnabled = true; if (appData.wordListCollapsed === undefined) appData.wordListCollapsed = false; if (!appData.collapsedGroups) appData.collapsedGroups = {}; ensureDefaultGroup(); ensureErrorBook(); migrateUngroupedWords(); saveData(); return; } initDefault(); }
        function migrateUngroupedWords() { const book = getActiveBook(); if (!book) return; ensureDefaultGroup(); book.words.forEach(w => { if (!w.groupId || !book.groups.find(g => g.id === w.groupId)) { w.groupId = DEFAULT_GROUP_ID; } }); saveData(); }
        function initDefault() { appData = { books: [{ id: 'default', name: '默认单词本', groups: [{ id: DEFAULT_GROUP_ID, name: DEFAULT_GROUP_NAME }], words: [{ id: 1, korean: '사랑', chinese: '爱情', pos: '名词', example: '사랑해요', nextReview: Date.now(), reviewCount: 0, mastered: false, wrongCount: 0, notes: '', groupId: DEFAULT_GROUP_ID }, { id: 2, korean: '공부', chinese: '学习', pos: '名词', example: '열심히 공부하세요', nextReview: Date.now(), reviewCount: 0, mastered: false, wrongCount: 0, notes: '', groupId: DEFAULT_GROUP_ID }, { id: 3, korean: '안녕하세요', chinese: '你好', pos: '感叹词', example: '안녕하세요, 반갑습니다', nextReview: Date.now(), reviewCount: 0, mastered: false, wrongCount: 0, notes: '', groupId: DEFAULT_GROUP_ID }], color: '#f7a8c4' }], activeBookId: 'default', showMastered: false, wordListCollapsed: false, collapsedGroups: {}, stats: { checkIns: [], todayNewCount: 0, todayReviewCount: 0, todayCorrect: 0, todayTotal: 0, streak: 0, dailyNewGoal: 10, lastBackupDate: null }, settings: { darkMode: false, fontSize: 36, lang: 'zh', reviewIntervals: { hardMin: 10, fuzzyHr: 4, easyStages: [1,3,7,15,30] }, spellMode: 'random', reminderEnabled: false, reminderTime: '09:00', selectedVoiceURI: 'auto', soundEnabled: true, autoReadOnReview: false, speakerIcon: 'icon-speaker-e', spellErrorCounts: {}, reviewOrder: 'random', spellOrder: 'random', backupReminderEnabled: true } }; ensureErrorBook(); saveData(); }
        function saveData() { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(appData)); appData.stats.lastBackupDate = new Date().toISOString(); } catch (e) { alert('⚠️ 存储空间不足，请导出备份数据！'); } }
        function getActiveBook() { if (appData.activeBookId === MASTERED_BOOK_ID) { const words = []; appData.books.forEach(b => { if (b.id !== ERROR_BOOK_ID) b.words.forEach(w => { if (w.mastered) words.push(w); }); }); return { id: MASTERED_BOOK_ID, name: MASTERED_BOOK_NAME, groups: [], words, color: '#f7a8c4' }; } return appData.books.find(b => b.id === appData.activeBookId) || appData.books[0]; }
        function getWords() { return getActiveBook().words; }
        function getReviewIntervals() { let ri = appData.settings.reviewIntervals; return { hardMs: (ri.hardMin || 10) * 60 * 1000, fuzzyMs: (ri.fuzzyHr || 4) * 60 * 60 * 1000, easyStages: ri.easyStages && ri.easyStages.length ? ri.easyStages : [1,3,7,15,30] }; }

        // 语音列表
        function loadVoices() { return new Promise(r => { let v = speechSynth.getVoices(); if (v.length) { updateVoiceList(v); r(); } else { speechSynth.onvoiceschanged = () => { v = speechSynth.getVoices(); updateVoiceList(v); r(); }; setTimeout(() => { v = speechSynth.getVoices(); updateVoiceList(v); r(); }, 2000); } }); }
        function updateVoiceList(voices) { allKoreanVoices = voices.filter(v => v.lang.startsWith('ko')); let sel = document.getElementById('voiceSelect'), hint = document.getElementById('voiceHint'), ci = document.getElementById('voiceCountInfo'); if (!sel) return; sel.innerHTML = '<option value="auto">自动选择 (优先本地高质量)</option>'; sel.innerHTML += `<option value="${GOOGLE_TTS_URI}" ${appData.settings.selectedVoiceURI===GOOGLE_TTS_URI?'selected':''}>🌐 Google TTS (在线·推荐)</option>`; if (allKoreanVoices.length === 0) { sel.innerHTML += '<option value="auto" disabled>— 未检测到本地韩语发音人 —</option>'; if (hint) hint.style.display = 'block'; if (ci) ci.textContent = '本地: 0个'; } else { allKoreanVoices.forEach(v => { const isLocal = v.localService !== false, ql = isLocal ? '本地' : '网络'; sel.innerHTML += `<option value="${escapeHTML(v.voiceURI)}" ${appData.settings.selectedVoiceURI===v.voiceURI?'selected':''}>🔊 ${escapeHTML(v.name)} [${ql}]</option>`; }); if (hint) hint.style.display = 'none'; if (ci) ci.textContent = `本地: ${allKoreanVoices.length}个`; } selectVoice(appData.settings.selectedVoiceURI); }

        function speak(text, rate) { if (!text) return; if (isGoogleTTS()) { speakWithGoogleTTS(text, rate); } else { speakWithBrowserTTS(text, rate); } }

        // 学习页

        function onReviewGroupChange() { loadReviewWord(); }
        function getReviewableWords() { let words = getWords().filter(w => !w.mastered); const groupFilter = document.getElementById('reviewGroupFilter')?.value; if (groupFilter) { words = words.filter(w => w.groupId === groupFilter); } const due = words.filter(w => w.nextReview <= Date.now()); if (appData.stats.todayNewCount >= appData.stats.dailyNewGoal) { return due.filter(w => w.reviewCount > 0); } return due; }

        function doSearch() {
    let q = document.getElementById('searchInput').value.trim().toLowerCase();
    if (!q) { document.getElementById('searchResults').innerHTML = '<p style="color:var(--text-muted);">输入关键词开始搜索</p>'; return; }
    let results = [];
    // 遍历所有书，同时记录单词所属分组
    appData.books.forEach(b => {
        const groups = b.groups || [];
        b.words.forEach(w => {
            if (w.korean.toLowerCase().includes(q) || w.chinese.toLowerCase().includes(q) || (w.notes && w.notes.toLowerCase().includes(q))) {
                // 查找单词所属的分组名称
                let groupName = '';
                if (w.groupId) {
                    const g = groups.find(gr => gr.id === w.groupId);
                    groupName = g ? g.name : '';
                }
                results.push({
                    ...w,
                    bookName: b.name,
                    groupName: groupName || '默认词组'
                });
            }
        });
    });
    const highlight = (text, query) => {
        if (!query) return escapeHTML(text);
        const escapedQuery = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        const regex = new RegExp(`(${escapedQuery})`, 'gi');
        return escapeHTML(text).replace(regex, '<mark>$1</mark>');
    };

       return `<div style="padding:8px;background:var(--card-bg);margin:4px 0;border-radius:8px;display:flex;align-items:center;gap:8px;">

        <span style="color:var(--text-muted);font-size:11px;">[${escapeHTML(r.bookName)} › ${escapeHTML(r.groupName)}]</span>
    </span>
    <button onclick="event.stopPropagation();deleteWordFromSearch('${escapeHTML(String(r.id))}')" title="删除" style="background:none;border:none;cursor:pointer;padding:4px;color:#c0a0a0;flex-shrink:0;">
        <svg width="16" height="16" viewBox="0 0 24 24" style="stroke:currentColor;fill:none;"><use href="#icon-trash-3"/></svg>
    </button>
</div>`;

    }).join('') || '<p style="color:var(--text-muted);">无结果</p>';
}

        function calcStreak(dates) { if (!dates.length) return 0; let sorted = dates.map(d => new Date(d)).sort((a, b) => a - b), today = new Date(); today.setHours(0,0,0,0); let latest = new Date(sorted[sorted.length-1]); latest.setHours(0,0,0,0); if (Math.round((today - latest) / 86400000) > 1) return 0; let streak = 1, max = 1; for (let i = 1; i < sorted.length; i++) { if (Math.round((sorted[i] - sorted[i-1]) / 86400000) === 1) streak++; else streak = 1; max = Math.max(max, streak); } return max; }

        function renderEbbinghausCurve() { const ce = document.getElementById('ebbinghausChart'), le = document.getElementById('ebbinghausLegend'), te = document.getElementById('ebbinghausTotal'); if (!ce || !le || !te) return; const now = Date.now(), stages = [{ k: 'due', l: '待复习', c: '#e85d75', d: '已到期' }, { k: '10min', l: '<10分钟', c: '#f08080', d: '刚学习' }, { k: '4hr', l: '10分-4时', c: '#f4a460', d: '短期' }, { k: '1day', l: '4时-1天', c: '#f0c060', d: '1天内' }, { k: '3day', l: '1-3天', c: '#8fbc8f', d: '巩固期' }, { k: '7day', l: '3-7天', c: '#5f9b7a', d: '稳定期' }, { k: '15day', l: '7-15天', c: '#4a90a4', d: '长期' }, { k: '30day', l: '15-30天', c: '#6b7db3', d: '牢固' }, { k: 'over30day', l: '超30天', c: '#c08060', d: '未掌握' }, { k: 'mastered', l: '已掌握', c: '#a080c0', d: '熟练' }]; let aw = []; appData.books.forEach(b => aw.push(...b.words)); const counts = {}; stages.forEach(s => counts[s.k] = 0); aw.forEach(w => { if (w.mastered) counts['mastered']++; else { const diff = w.nextReview - now; if (diff <= 0) counts['due']++; else if (diff <= 600000) counts['10min']++; else if (diff <= 14400000) counts['4hr']++; else if (diff <= 86400000) counts['1day']++; else if (diff <= 259200000) counts['3day']++; else if (diff <= 604800000) counts['7day']++; else if (diff <= 1296000000) counts['15day']++; else if (diff <= 2592000000) counts['30day']++; else counts['over30day']++; } }); const mc = Math.max(...Object.values(counts), 1); ce.innerHTML = stages.map(s => { const h = Math.max(4, Math.round((counts[s.k] / mc) * 140)); return `<div class="eb-bar-wrapper" title="${s.d}: ${counts[s.k]}个"><div class="eb-bar-count">${counts[s.k]}</div><div class="eb-bar" style="height:${h}px;background:${s.c};${counts[s.k]===0?'opacity:0.35;':''}"></div><div class="eb-bar-label">${s.l}</div></div>`; }).join(''); le.innerHTML = stages.map(s => `<span><span class="eb-legend-dot" style="background:${s.c};"></span>${s.l}(${s.d})</span>`).join(''); te.innerText = `📚 总词汇量：${aw.length} 个 | 待复习：${counts['due']} 个 | 已掌握：${counts['mastered']} 个`; }
