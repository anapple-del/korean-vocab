<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>韩语背单词 · 小清新</title>
    <link rel="manifest" href="data:application/manifest+json,%7B%22name%22%3A%22%E9%9F%A9%E8%AF%AD%E8%83%8C%E5%8D%95%E8%AF%8D%22%2C%22short_name%22%3A%22%E8%83%8C%E5%8D%95%E8%AF%8D%22%2C%22start_url%22%3A%22.%2F%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%23f0fdf4%22%2C%22theme_color%22%3A%22%23a7c957%22%7D">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #f0fdf4 0%, #fdf2f8 100%);
            background-attachment: fixed;
            color: #2c3e50; min-height: 100vh;
            display: flex; justify-content: center; padding: 16px;
        }
        .app-container {
            width: 100%; max-width: 600px; display: flex; flex-direction: column; gap: 20px;
        }
        .tabs {
            display: flex; background: rgba(255,255,255,0.8);
            backdrop-filter: blur(10px);
            border-radius: 24px; padding: 6px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.04);
        }
        .tab-btn {
            flex: 1; padding: 12px 4px; border: none; background: transparent;
            font-size: 15px; font-weight: 600; border-radius: 20px; transition: 0.3s;
            color: #6b7280; white-space: nowrap;
        }
        .tab-btn.active {
            background: #a7c957; color: white;
            box-shadow: 0 6px 14px rgba(167, 201, 87, 0.35);
        }
        .card-container, .spell-container {
            display: flex; flex-direction: column; align-items: center; gap: 16px;
        }
        .flip-card {
            width: 100%; height: 280px; perspective: 1000px; cursor: pointer;
        }
        .flip-card-inner {
            position: relative; width: 100%; height: 100%; transition: transform 0.6s;
            transform-style: preserve-3d;
        }
        .flip-card.flipped .flip-card-inner { transform: rotateY(180deg); }
        .card-front, .card-back {
            position: absolute; width: 100%; height: 100%; backface-visibility: hidden;
            border-radius: 32px; display: flex; flex-direction: column;
            justify-content: center; align-items: center; padding: 28px;
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(20px);
            box-shadow: 0 12px 40px rgba(0,0,0,0.06);
            text-align: center;
        }
        .card-back { transform: rotateY(180deg); background: #fef9c3; }
        .word-korean { font-size: 38px; font-weight: 700; margin-bottom: 8px; color: #1e293b; }
        .hint-text { font-size: 14px; color: #94a3b8; margin-bottom: 8px; }
        .meaning-chinese { font-size: 30px; font-weight: 600; color: #0f172a; }
        .pos-tag {
            display: inline-block; background: #e0f2fe; color: #0369a1;
            font-size: 13px; padding: 4px 12px; border-radius: 20px; margin-top: 6px;
        }
        .example-box { margin-top: 12px; display: flex; align-items: center; gap: 8px; }
        .example-text { font-size: 16px; color: #475569; font-style: italic; }
        .btn-group {
            display: flex; gap: 16px; width: 100%; justify-content: center;
        }
        .btn {
            flex: 1; padding: 16px; border: none; border-radius: 24px; font-size: 18px;
            font-weight: 600; transition: 0.2s; color: white;
        }
        .btn-speak {
            background: #c7d2fe; color: #3730a3; box-shadow: 0 4px 12px rgba(199,210,254,0.5);
            border-radius: 24px; padding: 12px 24px; border: none; font-size: 18px;
            font-weight: 600; width: auto; margin: 0 auto;
        }
        .btn-hard {
            background: #fca5a5; color: #7f1d1d;
            box-shadow: 0 4px 14px rgba(252, 165, 165, 0.4);
        }
        .btn-easy {
            background: #86efac; color: #14532d;
            box-shadow: 0 4px 14px rgba(134, 239, 172, 0.4);
        }
        .btn:active { transform: scale(0.95); }
        .empty-state {
            text-align: center; color: #94a3b8; padding: 40px; font-size: 18px;
        }
        .manage-panel { display: none; flex-direction: column; gap: 16px; }
        .manage-panel.active { display: flex; }
        .spell-panel { display: none; flex-direction: column; gap: 16px; }
        .spell-panel.active { display: flex; }
        .add-form {
            background: rgba(255,255,255,0.9); border-radius: 28px; padding: 24px;
            display: flex; flex-direction: column; gap: 12px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.04);
        }
        .add-form input {
            padding: 14px 18px; border: 2px solid #e2e8f0; border-radius: 18px;
            font-size: 16px; outline: none; transition: border 0.2s;
            background: white;
        }
        .add-form input:focus { border-color: #a7c957; }
        .add-form .ai-row {
            display: flex; gap: 8px; align-items: center;
        }
        .add-form .ai-row input { flex: 1; }
        .add-form button {
            padding: 14px; border: none; border-radius: 18px; background: #a7c957;
            color: white; font-size: 16px; font-weight: 600;
        }
        .ai-btn {
            background: #cbd5e1; color: #1e293b; padding: 14px 20px;
            border-radius: 18px; border: none; font-size: 16px; font-weight: 600;
            white-space: nowrap;
        }
        .word-list { display: flex; flex-direction: column; gap: 8px; }
        .word-item {
            background: rgba(255,255,255,0.9); backdrop-filter: blur(10px);
            border-radius: 20px; padding: 16px 20px;
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 4px 16px rgba(0,0,0,0.03);
        }
        .word-info { flex: 1; }
        .word-info .kr { font-weight: 600; font-size: 18px; color: #1e293b; }
        .word-info .zh { font-size: 14px; color: #64748b; margin-top: 4px; }
        .word-info .pos { font-size: 12px; color: #94a3b8; margin-top: 2px; }
        .del-btn {
            background: #fee2e2; color: #b91c1c; border: none; padding: 10px 16px;
            border-radius: 14px; font-weight: 500;
        }
        .progress-info {
            font-size: 14px; color: #64748b; text-align: center;
        }
        .spell-question {
            background: rgba(255,255,255,0.9); backdrop-filter: blur(10px);
            border-radius: 32px; padding: 28px;
            box-shadow: 0 12px 32px rgba(0,0,0,0.05); text-align: center;
            width: 100%;
        }
        .spell-input {
            padding: 14px 18px; border: 2px solid #e2e8f0; border-radius: 18px;
            font-size: 20px; text-align: center; width: 100%; outline: none;
            transition: border 0.2s; background: white;
        }
        .spell-input:focus { border-color: #a7c957; }
        .spell-feedback {
            font-size: 16px; font-weight: 500; min-height: 24px;
        }
        .correct { color: #16a34a; }
        .incorrect { color: #dc2626; }
    </style>
</head>
<body>
<div class="app-container">
    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('review')">🌸 背单词</button>
        <button class="tab-btn" onclick="switchTab('spell')">🖍️ 拼写</button>
        <button class="tab-btn" onclick="switchTab('manage')">📒 管理</button>
    </div>

    <!-- 复习界面 -->
    <div id="reviewPanel" class="card-container">
        <div class="progress-info" id="progressText"></div>
        <div class="flip-card" id="flipCard" onclick="flipCard()">
            <div class="flip-card-inner">
                <div class="card-front">
                    <div class="hint-text">🇰🇷 韩语</div>
                    <div class="word-korean" id="displayKorean"></div>
                    <div class="hint-text" style="margin-top:12px;">👆 点击卡片翻转</div>
                </div>
                <div class="card-back">
                    <div class="hint-text">🇨🇳 中文释义</div>
                    <div class="meaning-chinese" id="displayChinese"></div>
                    <div class="pos-tag" id="displayPOS" style="display:none;"></div>
                    <div class="example-box" id="exampleBox">
                        <span class="example-text" id="displayExample"></span>
                    </div>
                </div>
            </div>
        </div>
        <button class="btn-speak" onclick="speakCurrentWord()">🔊 听发音</button>
        <div class="btn-group" id="actionButtons">
            <button class="btn btn-hard" onclick="markWord('hard')">🥺 不认识</button>
            <button class="btn btn-easy" onclick="markWord('easy')">😊 认识了</button>
        </div>
        <div class="empty-state" id="emptyReview" style="display:none;">🎉 当前没有需要复习的单词<br>🌸 去添加一些吧~</div>
    </div>

    <!-- 拼写练习界面 -->
    <div id="spellPanel" class="spell-panel">
        <div id="spellSetup" style="text-align:center;">
            <div class="empty-state">🖍️ 拼写记忆练习<br><span style="font-size:15px;">根据中文意思，写出韩语单词</span></div>
            <button class="btn" style="background:#a7c957; color:white; max-width:200px; box-shadow:0 6px 16px rgba(167,201,87,0.35);" onclick="startSpell()">开始练习</button>
        </div>
        <div id="spellActive" style="display:none; width:100%;">
            <div class="progress-info" id="spellProgress"></div>
            <div class="spell-question">
                <div class="hint-text">🇨🇳 中文意思</div>
                <div class="meaning-chinese" id="spellChinese"></div>
                <div class="pos-tag" id="spellPOS" style="display:none;"></div>
                <div class="example-box" style="justify-content:center;">
                    <span class="example-text" id="spellExample"></span>
                </div>
                <button class="btn-speak" style="margin:8px auto;" onclick="speakSpellWord()">🔊 听发音</button>
                <input type="text" class="spell-input" id="spellInput" placeholder="输入韩语" autocomplete="off" autocapitalize="off">
                <div style="margin-top:14px;">
                    <button class="btn" style="background:#a7c957; color:white; max-width:120px; box-shadow:0 4px 12px rgba(167,201,87,0.3);" onclick="checkSpell()">检查</button>
                </div>
                <div class="spell-feedback" id="spellFeedback"></div>
            </div>
        </div>
        <div id="spellResult" style="display:none; text-align:center;">
            <div class="empty-state" id="spellResultText"></div>
            <button class="btn" style="background:#a7c957; color:white; max-width:200px; box-shadow:0 6px 16px rgba(167,201,87,0.35);" onclick="startSpell()">再来一次</button>
        </div>
    </div>

    <!-- 管理界面 -->
    <div id="managePanel" class="manage-panel">
        <div class="add-form">
            <div class="ai-row">
                <input type="text" id="inputKorean" placeholder="韩语单词" autocomplete="off">
                <button class="ai-btn" onclick="aiDetect()">🤖 AI识别</button>
            </div>
            <input type="text" id="inputChinese" placeholder="中文释义（自动填入或手动输入）" autocomplete="off">
            <input type="text" id="inputPOS" placeholder="词性（如：动词、名词、形容词…）" autocomplete="off">
            <input type="text" id="inputExample" placeholder="例句（选填）" autocomplete="off">
            <button onclick="addWord()">➕ 添加单词</button>
        </div>
        <div class="word-list" id="wordListContainer"></div>
    </div>
</div>

<script>
    // ---------- 发音 ----------
    let speechSynth = window.speechSynthesis;
    let koreanVoice = null;

    function loadVoices() {
        return new Promise((resolve) => {
            let voices = speechSynth.getVoices();
            if (voices.length) {
                koreanVoice = voices.find(v => v.lang.startsWith('ko')) || null;
                resolve();
            } else {
                speechSynth.onvoiceschanged = () => {
                    voices = speechSynth.getVoices();
                    koreanVoice = voices.find(v => v.lang.startsWith('ko')) || null;
                    resolve();
                };
            }
        });
    }
    loadVoices();

    function speak(text, rate = 0.9) {
        speechSynth.cancel();
        if (!text) return;
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'ko-KR';
        utterance.rate = rate;
        if (koreanVoice) utterance.voice = koreanVoice;
        speechSynth.speak(utterance);
    }

    function speakCurrentWord() {
        if (currentWord) speak(currentWord.korean);
    }

    function speakSpellWord() {
        if (spellCurrentWord) speak(spellCurrentWord.korean);
    }

    // ---------- 数据存储 ----------
    const STORAGE_KEY = 'korean_vocab_app_v2'; // 升级版本，避免旧数据冲突
    function loadWords() {
        const raw = localStorage.getItem(STORAGE_KEY);
        return raw ? JSON.parse(raw) : [];
    }
    function saveWords(words) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(words));
    }

    // 初始化示例数据（含词性）
    if (!localStorage.getItem(STORAGE_KEY)) {
        const demo = [
            { id: Date.now()+1, korean: '사랑', chinese: '爱情', pos: '名词', example: '사랑해요', nextReview: Date.now() },
            { id: Date.now()+2, korean: '공부', chinese: '学习', pos: '名词', example: '열심히 공부하세요', nextReview: Date.now() },
            { id: Date.now()+3, korean: '안녕하세요', chinese: '你好', pos: '感叹词', example: '안녕하세요, 반갑습니다', nextReview: Date.now() }
        ];
        saveWords(demo);
    }

    // ---------- AI识别 ----------
    async function aiDetect() {
        const kr = document.getElementById('inputKorean').value.trim();
        if (!kr) {
            alert('请先输入韩语单词');
            return;
        }
        const aiBtn = document.querySelector('.ai-btn');
        aiBtn.disabled = true;
        aiBtn.textContent = '⏳ 识别中…';
        try {
            const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=ko&tl=zh-CN&dt=t&q=${encodeURIComponent(kr)}`;
            const res = await fetch(url);
            const data = await res.json();
            if (data && data[0] && data[0][0] && data[0][0][0]) {
                document.getElementById('inputChinese').value = data[0][0][0];
            } else {
                alert('未能识别，请手动输入中文释义');
            }
        } catch (e) {
            alert('识别失败，请检查网络或手动输入');
        } finally {
            aiBtn.disabled = false;
            aiBtn.textContent = '🤖 AI识别';
        }
    }

    // ---------- 复习逻辑 ----------
    let currentWord = null;
    let cardFlipped = false;

    function getDueWords() {
        const now = Date.now();
        return loadWords().filter(w => w.nextReview <= now);
    }

    function pickNextWord() {
        const due = getDueWords();
        if (due.length === 0) {
            currentWord = null;
            document.getElementById('emptyReview').style.display = 'block';
            document.getElementById('flipCard').style.display = 'none';
            document.getElementById('actionButtons').style.display = 'none';
            document.querySelector('.btn-speak').style.display = 'none';
            document.getElementById('progressText').innerText = '';
            return;
        }
        document.getElementById('emptyReview').style.display = 'none';
        document.getElementById('flipCard').style.display = 'block';
        document.getElementById('actionButtons').style.display = 'flex';
        document.querySelector('.btn-speak').style.display = 'block';
        const randomIndex = Math.floor(Math.random() * due.length);
        currentWord = due[randomIndex];
        cardFlipped = false;
        document.getElementById('flipCard').classList.remove('flipped');
        document.getElementById('displayKorean').innerText = currentWord.korean;
        document.getElementById('displayChinese').innerText = currentWord.chinese;
        const pos = currentWord.pos || '';
        const posEl = document.getElementById('displayPOS');
        if (pos) {
            posEl.style.display = 'inline-block';
            posEl.innerText = pos;
        } else {
            posEl.style.display = 'none';
        }
        const exampleText = currentWord.example || '';
        document.getElementById('displayExample').innerText = exampleText;
        document.getElementById('exampleBox').style.display = exampleText ? 'flex' : 'none';
        document.getElementById('progressText').innerText = `📌 待复习：${due.length} 个单词`;
        speechSynth.cancel();
    }

    function flipCard() {
        if (!currentWord) return;
        document.getElementById('flipCard').classList.toggle('flipped');
        cardFlipped = !cardFlipped;
    }

    function markWord(type) {
        if (!currentWord) return;
        const words = loadWords();
        const index = words.findIndex(w => w.id === currentWord.id);
        if (index === -1) return;
        const now = Date.now();
        if (type === 'hard') {
            words[index].nextReview = now + 10 * 60 * 1000;
        } else {
            const endOfDay = new Date();
            endOfDay.setHours(23, 59, 59, 999);
            words[index].nextReview = endOfDay.getTime();
        }
        saveWords(words);
        speechSynth.cancel();
        pickNextWord();
    }

    // ---------- 拼写练习 ----------
    let spellWords = [], spellErrorWords = [], spellCurrentWord = null, spellTotal = 0, spellCorrectCount = 0;

    function startSpell() {
        const allWords = loadWords();
        if (allWords.length === 0) {
            alert('请先添加单词！');
            return;
        }
        spellWords = [...allWords].sort(() => Math.random() - 0.5);
        spellErrorWords = [];
        spellCurrentWord = null;
        spellTotal = spellWords.length;
        spellCorrectCount = 0;
        document.getElementById('spellSetup').style.display = 'none';
        document.getElementById('spellActive').style.display = 'block';
        document.getElementById('spellResult').style.display = 'none';
        document.getElementById('spellFeedback').innerHTML = '';
        document.getElementById('spellInput').value = '';
        nextSpellWord();
    }

    function nextSpellWord() {
        if (spellWords.length === 0) {
            if (spellErrorWords.length > 0) {
                spellWords = [...spellErrorWords];
                spellErrorWords = [];
            } else {
                finishSpell();
                return;
            }
        }
        spellCurrentWord = spellWords.shift();
        document.getElementById('spellChinese').innerText = spellCurrentWord.chinese;
        const pos = spellCurrentWord.pos || '';
        const posEl = document.getElementById('spellPOS');
        if (pos) {
            posEl.style.display = 'inline-block';
            posEl.innerText = pos;
        } else {
            posEl.style.display = 'none';
        }
        const example = spellCurrentWord.example || '';
        document.getElementById('spellExample').innerText = example;
        document.getElementById('spellExample').parentElement.style.display = example ? 'flex' : 'none';
        document.getElementById('spellInput').value = '';
        document.getElementById('spellFeedback').innerHTML = '';
        document.getElementById('spellProgress').innerText = `📝 剩余 ${spellWords.length + 1} 个单词 (已正确 ${spellCorrectCount} 个)`;
        speechSynth.cancel();
    }

    function checkSpell() {
        if (!spellCurrentWord) return;
        const input = document.getElementById('spellInput').value.trim();
        if (!input) return;
        const correctAnswer = spellCurrentWord.korean.trim();
        const feedbackDiv = document.getElementById('spellFeedback');
        if (input === correctAnswer) {
            feedbackDiv.innerHTML = '<span class="correct">✅ 正确！</span>';
            spellCorrectCount++;
            setTimeout(() => nextSpellWord(), 800);
        } else {
            feedbackDiv.innerHTML = `<span class="incorrect">❌ 错误！正确写法：${correctAnswer}</span>`;
            spellErrorWords.push(spellCurrentWord);
            setTimeout(() => nextSpellWord(), 1500);
        }
        document.getElementById('spellInput').value = '';
    }

    function finishSpell() {
        document.getElementById('spellActive').style.display = 'none';
        document.getElementById('spellResult').style.display = 'block';
        document.getElementById('spellResultText').innerHTML = '🎉 拼写练习完成！<br>🌸 全部正确啦~';
    }

    // ---------- 管理单词 ----------
    function renderWordList() {
        const words = loadWords();
        const container = document.getElementById('wordListContainer');
        if (words.length === 0) {
            container.innerHTML = '<div class="empty-state">还没有单词，添加第一个吧 ✍️</div>';
            return;
        }
        container.innerHTML = words.map(w => `
            <div class="word-item">
                <div class="word-info">
                    <div class="kr">${w.korean}</div>
                    <div class="zh">${w.chinese}</div>
                    <div class="pos">${w.pos || ''} ${w.example ? '· ' + w.example : ''}</div>
                </div>
                <button class="del-btn" onclick="deleteWord(${w.id})">删除</button>
            </div>
        `).join('');
    }

    function addWord() {
        const kr = document.getElementById('inputKorean').value.trim();
        const zh = document.getElementById('inputChinese').value.trim();
        const pos = document.getElementById('inputPOS').value.trim();
        const ex = document.getElementById('inputExample').value.trim();
        if (!kr || !zh) {
            alert('请填写韩语单词和中文释义');
            return;
        }
        const words = loadWords();
        words.push({
            id: Date.now(),
            korean: kr,
            chinese: zh,
            pos: pos,
            example: ex,
            nextReview: Date.now()
        });
        saveWords(words);
        document.getElementById('inputKorean').value = '';
        document.getElementById('inputChinese').value = '';
        document.getElementById('inputPOS').value = '';
        document.getElementById('inputExample').value = '';
        renderWordList();
        if (document.getElementById('reviewPanel').style.display !== 'none') {
            pickNextWord();
        }
    }

    function deleteWord(id) {
        let words = loadWords();
        words = words.filter(w => w.id !== id);
        saveWords(words);
        renderWordList();
        if (currentWord && currentWord.id === id) pickNextWord();
    }

    // ---------- 页面切换 ----------
    function switchTab(tab) {
        const reviewPanel = document.getElementById('reviewPanel');
        const spellPanel = document.getElementById('spellPanel');
        const managePanel = document.getElementById('managePanel');
        const tabs = document.querySelectorAll('.tab-btn');
        tabs.forEach(btn => btn.classList.remove('active'));
        reviewPanel.style.display = 'none';
        spellPanel.classList.remove('active');
        managePanel.classList.remove('active');
        if (tab === 'review') {
            reviewPanel.style.display = 'flex';
            tabs[0].classList.add('active');
            pickNextWord();
        } else if (tab === 'spell') {
            spellPanel.classList.add('active');
            tabs[1].classList.add('active');
            document.getElementById('spellSetup').style.display = 'block';
            document.getElementById('spellActive').style.display = 'none';
            document.getElementById('spellResult').style.display = 'none';
            speechSynth.cancel();
        } else if (tab === 'manage') {
            managePanel.classList.add('active');
            tabs[2].classList.add('active');
            renderWordList();
        }
    }

    switchTab('review');

    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('sw.js', { scope: './' })
                .then(reg => console.log('SW registered', reg))
                .catch(err => console.log('SW failed', err));
        });
    }
</script>
